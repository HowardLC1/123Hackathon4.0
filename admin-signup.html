<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Регистрация администратора</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand">
        <b>Создать админа</b>
        <span>Администраторы могут входить и управлять жалобами.</span>
      </div>
      <div class="nav-actions">
        <button class="btn" onclick="window.location.href='index.html'">Главная</button>
        <button class="btn" onclick="window.location.href='admin.html'">Вход</button>
      </div>
    </div>

    <div class="grid" style="grid-template-columns:1fr;">
      <section class="card pad">
        <form id="adminSignupForm" class="form">
          <div class="row">
            <div>
              <label for="name">Полное имя</label>
              <input id="name" type="text" name="name" placeholder="Алексей Админов" required />
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" type="email" name="email" placeholder="admin@example.com" required />
            </div>
          </div>

          <div class="row">
            <div>
              <label for="password">Пароль</label>
              <input id="password" type="password" name="password" placeholder="••••••••" required />
            </div>
            <div>
              <label for="institution">Учреждение (Сфера)</label>
              <select id="institution" name="institution" required>
                <option value="">Выберите</option>
                <option value="Health">Здравоохранение</option>
                <option value="Education">Образование</option>
                <option value="Sport">Спорт</option>
              </select>
            </div>
          </div>

          <button id="signupBtn" class="btn primary block" type="submit">Зарегистрироваться</button>
          <div id="errorMessage" class="msg" style="display:none;"></div>
        </form>
      </section>
    </div>
  </div>

  <script src="assistant.js" defer></script>
  <script>
    document.getElementById('adminSignupForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const form = document.getElementById('adminSignupForm');
      const formData = new FormData(form);
      const btn = document.getElementById('signupBtn');
      const msg = document.getElementById('errorMessage');
      msg.style.display = 'none';
      msg.className = 'msg';

      const BASE_URL = (window.location.protocol === 'file:')
        ? 'http://localhost:4000'
        : window.location.origin;

      try {
        btn.disabled = true;
        btn.textContent = 'Создание...';

        const response = await fetch(`${BASE_URL}/api/auth/signup`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            name: formData.get('name'),
            email: formData.get('email'),
            password: formData.get('password'),
            institution: formData.get('institution')
          }),
        });

        const result = await response.json();

        if (response.ok) {
          alert('✅ Администратор успешно зарегистрирован! Пожалуйста, войдите в систему.');
          window.location.href = 'admin.html';
        } else {
          msg.style.display = 'block';
          msg.className = 'msg err';
          msg.textContent = `Ошибка: ${result.message || 'Не удалось выполнить запрос'}`;
        }
      } catch (err) {
        console.error('Ошибка при регистрации:', err);
        msg.style.display = 'block';
        msg.className = 'msg err';
        msg.textContent = 'Ошибка сети, пожалуйста, попробуйте позже.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Зарегистрироваться';
      }
    });
  </script>
</body>
</html>
