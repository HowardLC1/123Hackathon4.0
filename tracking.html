<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Отследить статус жалобы</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">

    <div class="nav">
      <div class="brand">
        <b>Отследить жалобу</b>
        <span>Введите ID тикета, чтобы увидеть статус и ответ.</span>
      </div>
      <div class="nav-actions">
        <button class="btn" onclick="window.location.href='index.html'">Главная</button>
      </div>
    </div>

    <div class="grid" style="grid-template-columns:1fr;">
      <section class="card pad">
        <form id="trackingForm" class="form">
          <div>
            <label for="ticketId">ID тикета</label>
            <input type="text" id="ticketId" placeholder="TKT1700000000000-1234" required />
          </div>
          <button id="trackBtn" class="btn primary block" type="submit">Отследить</button>
          <div id="statusResult" class="msg" style="display:none;"></div>
        </form>
      </section>
    </div>

  </div>

  <script src="assistant.js" defer></script>
  <script>
    const BASE_URL = (window.location.protocol === 'file:')
      ? 'http://localhost:4000'
      : window.location.origin;

    document.getElementById('trackingForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const ticketId = document.getElementById('ticketId').value.trim();
      const statusDiv = document.getElementById('statusResult');
      const btn = document.getElementById('trackBtn');
      statusDiv.style.display = 'none';
      statusDiv.className = 'msg';

      try {
        btn.disabled = true;
        btn.textContent = 'Загрузка...';

        const response = await fetch(`${BASE_URL}/api/complaints/status/${ticketId}`);
        const contentType = response.headers.get("content-type");

        if (!response.ok) {
          const message = await response.text();
          // Перевод ошибки, если тикет не найден
          const errorMsg = response.status === 404 ? "Тикет не найден" : message;
          throw new Error(`Ошибка ${response.status}: ${errorMsg}`);
        }

        if (contentType && contentType.includes("application/json")) {
          const result = await response.json();
          
          // Словарь для перевода статусов и категорий
          const translations = {
            'Pending': 'В ожидании',
            'In Progress': 'В работе',
            'Resolved': 'Решено',
            'Health': 'Здравоохранение',
            'Education': 'Образование',
            'Sport': 'Спорт'
          };

          const displayStatus = translations[result.status] || result.status;
          const displayCategory = translations[result.category] || result.category;

          statusDiv.style.display = 'block';
          statusDiv.className = 'msg ok';
          statusDiv.innerHTML = `
            <div><span class="pill">Тикет</span> ${result.ticketId}</div>
            <div style="margin-top:6px;"><span class="pill">Статус</span> ${displayStatus}</div>
            <div style="margin-top:6px;"><span class="pill">Категория</span> ${displayCategory}</div>
            <div style="margin-top:6px;"><span class="pill">Дата подачи</span> ${new Date(result.submittedAt).toLocaleString('ru-RU')}</div>
            ${result.responseNote ? `
              <div style="margin-top:10px;">
                <span class="pill">Ответ ведомства</span>
                <div style="margin-top:6px; color:rgba(234,240,255,.85); line-height:1.4;">${result.responseNote}</div>
              </div>` : `
              <div style="margin-top:10px; color:var(--muted); font-size:12px;">Ответ пока не предоставлен.</div>
            `}
          `;
        } else {
          const message = await response.text();
          throw new Error(`Неподдерживаемый формат ответа: ${message}`);
        }
      } catch (error) {
        console.error(error);
        statusDiv.style.display = 'block';
        statusDiv.className = 'msg err';
        statusDiv.textContent = error.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Отследить';
      }
    });
  </script>
</body>
</html>
